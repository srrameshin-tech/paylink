<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1A1024">
<title>PayLink</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root{
    --bg:#1A1024;
    --bg2:#241531;
    --card:#2A1A3A;
    --card2:#321F45;
    --coral:#FF7A5C;
    --coral-dim:#E85A42;
    --gold:#FFC94B;
    --mint:#3EE8A8;
    --lav:#9B8FA8;
    --lav-dim:#6E6378;
    --text:#F3ECF7;
    --line:#43304F;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:'Segoe UI',Roboto,system-ui,sans-serif; min-height:100vh; overscroll-behavior-y:none;}
  body{
    background-image:
      radial-gradient(circle at 15% 8%, rgba(255,107,91,0.10), transparent 35%),
      radial-gradient(circle at 90% 80%, rgba(95,217,164,0.07), transparent 40%);
  }
  .num{font-family:'Courier New',monospace; font-weight:700;}
  .amt-display{font-family:'Georgia',serif; font-weight:700;}

  a{color:inherit; text-decoration:none;}
  button{font-family:inherit; cursor:pointer;}
  input,select,textarea{font-family:inherit;}

  /* ---- screens ---- */
  .screen{display:none; min-height:100vh; padding-bottom:30px;}
  .screen.active{display:block;}

  /* ---- login ---- */
  #loginScreen.active{display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:24px;}
  .brand{text-align:center; margin-bottom:36px;}
  .brand-mark{
    width:64px; height:64px; border-radius:18px;
    background:linear-gradient(145deg, var(--coral), var(--coral-dim));
    display:flex; align-items:center; justify-content:center;
    margin:0 auto 14px; font-size:30px;
    box-shadow:0 8px 24px rgba(255,107,91,0.35);
  }
  .brand h1{margin:0; font-size:26px; letter-spacing:0.5px; font-weight:800;}
  .brand p{margin:6px 0 0; color:var(--lav); font-size:13px;}
  .pin-dots{display:flex; gap:14px; margin:28px 0;}
  .pin-dot{width:16px; height:16px; border-radius:50%; border:2px solid var(--lav-dim); transition:all .15s;}
  .pin-dot.filled{background:var(--coral); border-color:var(--coral); box-shadow:0 0 12px rgba(255,107,91,0.6);}
  .keypad{display:grid; grid-template-columns:repeat(3,72px); gap:14px; margin-top:8px;}
  .key{
    width:72px; height:72px; border-radius:50%; border:1px solid var(--line);
    background:var(--card); color:var(--text); font-size:22px; font-weight:600;
    display:flex; align-items:center; justify-content:center;
  }
  .key:active{background:var(--card2); transform:scale(0.96);}
  .key.empty{background:transparent; border:none;}
  .login-error{color:var(--coral); font-size:13px; margin-top:14px; min-height:18px;}
  .forgot-link{margin-top:18px; color:var(--lav); font-size:13px; text-decoration:underline;}

  /* ---- top bar ---- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 18px 14px; position:sticky; top:0; background:var(--bg);
    z-index:10; border-bottom:1px solid var(--line);
  }
  .topbar h2{margin:0; font-size:19px; font-weight:800;}
  .icon-btn{
    width:38px; height:38px; border-radius:10px; background:var(--card);
    border:1px solid var(--line); display:flex; align-items:center; justify-content:center;
    font-size:17px; color:var(--text);
  }
  .icon-btn:active{background:var(--card2);}

  .content{padding:18px;}

  /* ---- tabs ---- */
  .tabbar{
    position:fixed; bottom:0; left:0; right:0; display:flex;
    background:var(--bg2); border-top:1px solid var(--line); padding:8px 8px calc(8px + env(safe-area-inset-bottom));
    z-index:20;
  }
  .tab{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:8px 0; color:var(--lav-dim); font-size:11px; border:none; background:none;
  }
  .tab .tab-ic{font-size:21px;}
  .tab.active{color:var(--coral);}

  /* ---- form ---- */
  .field{margin-bottom:18px;}
  .field label{display:block; font-size:13px; color:var(--lav); margin-bottom:7px; font-weight:600;}
  .field input, .field textarea{
    width:100%; padding:14px 15px; border-radius:13px; border:1px solid var(--line);
    background:var(--card); color:#FFFFFF; font-size:15.5px; outline:none;
  }
  .field input:focus, .field textarea:focus{border-color:var(--coral);}
  .field .hint{font-size:11.5px; color:var(--lav-dim); margin-top:6px;}
  .amount-input-wrap{position:relative;}
  .amount-input-wrap .rupee{
    position:absolute; left:15px; top:50%; transform:translateY(-50%);
    font-size:17px; color:var(--gold); font-weight:700;
  }
  .amount-input-wrap input{padding-left:34px; font-size:19px; font-weight:700; font-family:'Georgia',serif;}

  .btn-primary{
    width:100%; padding:16px; border-radius:14px; border:none;
    background:linear-gradient(135deg, var(--coral), var(--coral-dim));
    color:#fff; font-size:16px; font-weight:700; box-shadow:0 6px 18px rgba(255,107,91,0.30);
  }
  .btn-primary:active{transform:translateY(1px);}
  .btn-secondary{
    width:100%; padding:14px; border-radius:14px; border:1px solid var(--line);
    background:var(--card); color:var(--text); font-size:14.5px; font-weight:600;
  }
  .btn-row{display:flex; gap:10px; margin-top:10px;}
  .btn-row > *{flex:1;}

  /* ---- receipt card ---- */
  .receipt-wrap{display:flex; justify-content:center; padding:14px 0 4px;}
  .receipt{
    width:100%; max-width:340px;
    background:
      linear-gradient(var(--card), var(--card)) padding-box,
      linear-gradient(135deg, var(--gold), var(--coral) 45%, var(--mint)) border-box;
    border:2.5px solid transparent;
    border-radius:16px; position:relative; overflow:visible;
    box-shadow:0 14px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,201,75,0.3), 0 0 36px rgba(255,201,75,0.32);
  }
  .receipt::before{
    content:"✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦";
    position:absolute; top:8px; left:0; right:0; text-align:center;
    color:var(--gold); font-size:9px; letter-spacing:3px; opacity:0.55;
  }
  .receipt-notch{
    position:absolute; top:-9px; left:0; right:0; height:18px;
    background:
      radial-gradient(circle at 18px 0, transparent 9px, var(--card) 9.5px) top left,
      radial-gradient(circle at 50px 0, transparent 9px, var(--card) 9.5px) top left;
    background-size:32px 18px; background-repeat:repeat-x;
  }
  .receipt-notch.bottom{top:auto; bottom:-9px; transform:scaleY(-1);}
  .receipt-inner{padding:28px 22px 18px;}
  .receipt-stamp{
    text-align:center; font-size:11px; letter-spacing:2px; color:var(--lav-dim);
    text-transform:uppercase; margin-bottom:2px; font-weight:700;
  }
  .receipt-amt{
    text-align:center; font-size:30px; font-weight:800; color:var(--gold);
    font-family:'Georgia',serif; margin:4px 0 12px;
  }
  .receipt-line{
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:8px 0; border-bottom:1px dashed var(--line); font-size:13.5px; gap:10px;
  }
  .receipt-line:last-of-type{border-bottom:none;}
  .receipt-line .l-key{color:var(--lav); flex-shrink:0;}
  .receipt-line .l-val{color:var(--text); font-weight:600; text-align:right; word-break:break-word;}
  #rcPurpose{color:var(--mint); font-weight:700;}
  .qr-box{
    display:flex; justify-content:center; margin:14px 0 6px; padding:16px;
    background:#fff; border-radius:12px;
    box-shadow:0 0 24px rgba(255,201,75,0.25);
  }
  .qr-box canvas, .qr-box img{display:block; width:220px; height:220px;}
  .btn-paynow{
    display:flex; align-items:center; justify-content:center; gap:8px;
    text-decoration:none; margin:14px 0 4px; padding:13px;
    border-radius:12px; font-size:15.5px; font-weight:800; letter-spacing:0.3px;
    color:#0B2B1E; background:linear-gradient(135deg, var(--mint), #3FAE82);
    box-shadow:0 8px 20px rgba(95,217,164,0.4);
  }
  .btn-paynow:active{transform:translateY(1px);}
  .receipt-foot{text-align:center; font-size:15px; color:#ffffff; margin-top:10px; letter-spacing:0.5px; font-weight:700;}
  .paid-stamp{
    position:absolute; top:42%; left:50%; transform:translate(-50%,-50%) rotate(-18deg);
    border:4px solid var(--mint); color:var(--mint); font-weight:800; font-size:26px;
    padding:6px 18px; border-radius:8px; letter-spacing:3px; opacity:0.88;
    background:rgba(95,217,164,0.06);
  }

  .receipt-actions{display:flex; gap:8px; margin-top:14px; padding:0 2px;}
  .receipt-actions button{
    flex:1; padding:11px; border-radius:12px; border:1px solid var(--line);
    background:var(--card2); color:var(--text); font-size:12.5px; font-weight:600;
    display:flex; flex-direction:column; align-items:center; gap:3px;
  }
  .receipt-actions button .a-ic{font-size:17px;}

  /* ---- history list ---- */
  .hist-item{
    background:var(--card); border-radius:14px; padding:15px 16px; margin-bottom:12px;
    border:1px solid var(--line); position:relative;
  }
  .hist-top{display:flex; justify-content:space-between; align-items:flex-start;}
  .hist-amt{font-size:19px; font-weight:800; color:var(--gold); font-family:'Georgia',serif;}
  .hist-purpose{font-size:14px; color:var(--text); margin-top:3px; font-weight:600;}
  .hist-meta{font-size:12px; color:var(--lav-dim); margin-top:6px;}
  .status-chip{
    font-size:11px; font-weight:700; padding:5px 11px; border-radius:20px; white-space:nowrap;
  }
  .status-chip.pending{background:rgba(242,184,75,0.15); color:var(--gold);}
  .status-chip.paid{background:rgba(95,217,164,0.15); color:var(--mint);}
  .hist-actions{display:flex; gap:8px; margin-top:12px;}
  .hist-actions button{
    flex:1; padding:9px; border-radius:10px; border:1px solid var(--line);
    background:var(--card2); color:var(--text); font-size:12px; font-weight:600;
  }
  .hist-actions button.danger{color:var(--coral);}

  .empty-state{text-align:center; padding:60px 20px; color:var(--lav-dim);}
  .empty-state .e-ic{font-size:44px; margin-bottom:14px; opacity:0.5;}
  .empty-state p{font-size:14px; margin:0;}

  .search-bar{
    display:flex; align-items:center; gap:10px; background:var(--card);
    border:1px solid var(--line); border-radius:13px; padding:12px 15px; margin-bottom:16px;
  }
  .search-bar input{flex:1; background:none; border:none; outline:none; color:var(--text); font-size:14.5px;}

  /* ---- sheet overlay ---- */
  .overlay{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55);
    z-index:50; align-items:flex-end; justify-content:center;
  }
  .overlay.active{display:flex;}
  .sheet{
    width:100%; max-width:480px; background:var(--bg2); border-radius:22px 22px 0 0;
    padding:16px 18px calc(16px + env(safe-area-inset-bottom)); max-height:92vh; overflow-y:auto;
    animation:slideUp .22s ease-out;
  }
  @keyframes slideUp{from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .sheet-handle{width:36px; height:4px; background:var(--line); border-radius:3px; margin:0 auto 18px;}
  .sheet h3{margin:0 0 18px; font-size:17px; font-weight:800;}

  .toast{
    position:fixed; top:24px; left:50%; transform:translateX(-50%);
    background:var(--card2); color:var(--text); padding:13px 20px; border-radius:30px;
    font-size:13.5px; box-shadow:0 8px 24px rgba(0,0,0,0.4); z-index:200;
    border:1px solid var(--line); opacity:0; transition:opacity .25s; max-width:88%; text-align:center;
  }
  .toast.show{opacity:1;}

  .stat-row{display:flex; gap:10px; margin-bottom:18px;}
  .stat-card{flex:1; background:var(--card); border-radius:14px; padding:14px; border:1px solid var(--line);}
  .stat-card .s-label{font-size:11px; color:var(--lav); margin-bottom:5px;}
  .stat-card .s-val{font-size:18px; font-weight:800; font-family:'Georgia',serif;}
  .stat-card.coral .s-val{color:var(--coral);}
  .stat-card.gold .s-val{color:var(--gold);}
  .stat-card.mint .s-val{color:var(--mint);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="brand">
    <div class="brand-mark">💸</div>
    <h1>PayLink</h1>
    <p id="loginSub">PIN போடுங்க</p>
  </div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="login-error" id="loginError"></div>
  <div class="keypad" id="keypad"></div>
  <div class="forgot-link" id="forgotLink">PIN மறந்துடிங்களா?</div>
</div>

<!-- MAIN APP -->
<div id="mainScreen" class="screen">
  <!-- CREATE TAB -->
  <div id="createTab" class="tab-content">
    <div class="topbar">
      <h2>PayLink</h2>
      <div class="icon-btn" id="lockBtn">🔒</div>
    </div>
    <div class="content">
      <div class="field">
        <label>UPI ID</label>
        <input type="text" id="inUpi" placeholder="yourname@upi" autocomplete="off">
        <div class="hint">GPay / PhonePe / Paytm UPI ID</div>
      </div>
      <div class="field">
        <label>பெயர் (Payee Name)</label>
        <input type="text" id="inName" placeholder="உங்க பெயர்" autocomplete="off">
      </div>
      <div class="field">
        <label>தொகை (Amount)</label>
        <div class="amount-input-wrap">
          <span class="rupee">₹</span>
          <input type="number" id="inAmount" placeholder="0" inputmode="decimal">
        </div>
      </div>
      <div class="field">
        <label>காரணம் (Purpose)</label>
        <input type="text" id="inPurpose" placeholder="எ.கா. Kovil donation, Chit payment" autocomplete="off">
      </div>
      <button class="btn-primary" id="genBtn">QR & Link Generate பண்ணு</button>
    </div>
  </div>

  <!-- HISTORY TAB -->
  <div id="historyTab" class="tab-content" style="display:none;">
    <div class="topbar">
      <h2>History</h2>
      <div class="icon-btn" id="lockBtn2">🔒</div>
    </div>
    <div class="content">
      <div class="stat-row" id="statRow"></div>
      <div class="search-bar">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="Purpose, UPI ID search பண்ணு...">
      </div>
      <div id="historyList"></div>
    </div>
  </div>

  <div class="tabbar">
    <button class="tab active" id="tabCreateBtn">
      <span class="tab-ic">➕</span><span>Create</span>
    </button>
    <button class="tab" id="tabHistoryBtn">
      <span class="tab-ic">🧾</span><span>History</span>
    </button>
  </div>
</div>

<!-- RECEIPT SHEET -->
<div class="overlay" id="receiptOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="receipt-wrap">
      <div class="receipt" id="receiptCard">
        <div class="receipt-notch"></div>
        <div class="receipt-inner">
          <div class="receipt-stamp">Payment Request</div>
          <div class="receipt-amt" id="rcAmt">₹0</div>
          <div class="receipt-line"><span class="l-key">Pay to</span><span class="l-val" id="rcName">-</span></div>
          <div class="receipt-line"><span class="l-key">UPI ID</span><span class="l-val" id="rcUpi">-</span></div>
          <div class="receipt-line"><span class="l-key">Purpose</span><span class="l-val" id="rcPurpose">-</span></div>
          <div class="receipt-line"><span class="l-key">Date</span><span class="l-val" id="rcDate">-</span></div>
          <div class="qr-box"><div id="qrcodeEl"></div></div>
          <a href="#" id="payNowBtn" class="btn-paynow" target="_blank" rel="noopener">💳 Pay Now</a>
          <div class="receipt-foot">Scan QR illa Pay Now பட்டன் அழுத்துங்க</div>
          <div class="paid-stamp" id="paidStampInline" style="display:none;">PAID</div>
        </div>
        <div class="receipt-notch bottom"></div>
      </div>
    </div>
    <div class="receipt-actions">
      <button id="shareBtn"><span class="a-ic">📤</span>Share</button>
      <button id="copyBtn"><span class="a-ic">📋</span>Copy Link</button>
      <button id="dlBtn"><span class="a-ic">⬇️</span>Card Save</button>
    </div>
    <button class="btn-secondary" style="margin-top:10px;" id="closeReceiptBtn">மூடு</button>
  </div>
</div>

<!-- FORGOT PIN SHEET -->
<div class="overlay" id="forgotOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3>PIN Recovery</h3>
    <div class="field">
      <label>Secret Recovery Code</label>
      <input type="text" id="recoveryCodeInput" placeholder="Recovery code போடுங்க" autocomplete="off">
    </div>
    <div class="field">
      <label>புது PIN (4 digits)</label>
      <input type="text" id="newPinInput" placeholder="••••" inputmode="numeric" maxlength="4">
    </div>
    <div class="login-error" id="recoveryError"></div>
    <button class="btn-primary" id="recoverBtn">PIN Reset பண்ணு</button>
    <button class="btn-secondary" style="margin-top:10px;" id="closeForgotBtn">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="qrcode.min.js?v=2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="app.js?v=2"></script>
</body>
</html>
