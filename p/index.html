<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PayLink - Payment Request</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
  :root{
    --bg:#1A1024; --card:#2A1A3A;
    --coral:#FF7A5C; --coral-dim:#E85A42;
    --gold:#FFC94B; --mint:#3EE8A8;
    --lav:#9B8FA8; --lav-dim:#6E6378;
    --text:#F3ECF7; --line:#43304F;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; height:100dvh; background:var(--bg); color:var(--text);
    font-family:'Segoe UI',Roboto,Arial,sans-serif;
    display:flex; align-items:center; justify-content:center;
    padding:10px 14px; overflow:hidden;
  }
  #root{width:100%; max-width:360px; transform-origin:center center; will-change:transform;}
  .receipt{
    width:100%;
    background:
      linear-gradient(var(--card), var(--card)) padding-box,
      linear-gradient(135deg, var(--gold), var(--coral) 45%, var(--mint)) border-box;
    border:2.5px solid transparent;
    border-radius:16px; position:relative;
    box-shadow:0 14px 40px rgba(0,0,0,0.5), 0 0 26px rgba(242,184,75,0.18);
  }
  .receipt::before{
    content:"✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦";
    position:absolute; top:8px; left:0; right:0; text-align:center;
    color:var(--gold); font-size:9px; letter-spacing:3px; opacity:0.55;
  }
  .receipt-inner{padding:28px 22px 22px;}
  .receipt-stamp{
    text-align:center; margin-bottom:8px;
  }
  .receipt-stamp span{
    display:inline-block; background:linear-gradient(135deg, var(--gold), var(--coral));
    color:#1A1024; font-size:12px; letter-spacing:2px; font-weight:800;
    text-transform:uppercase; padding:6px 16px; border-radius:20px;
    box-shadow:0 4px 14px rgba(255,201,75,0.45);
  }
  .receipt-amt{
    text-align:center; font-size:32px; font-weight:800; color:var(--gold);
    font-family:'Georgia',serif; margin:4px 0 4px;
  }
  .receipt-open-note{
    text-align:center; font-size:12.5px; color:var(--lav-dim); margin:0 0 14px;
  }
  .receipt-line{
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:9px 0; border-bottom:1px dashed var(--line); font-size:14px; gap:10px;
  }
  .receipt-line:last-of-type{border-bottom:none;}
  .receipt-line .l-key{color:var(--lav); flex-shrink:0;}
  .receipt-line .l-val{color:var(--text); font-weight:600; text-align:right; word-break:break-word;}
  .receipt-line .l-val.purpose-val{color:var(--mint); font-weight:700;}
  .qr-box{
    display:flex; justify-content:center; margin:16px 0 6px; padding:16px;
    background:#fff; border-radius:12px;
    box-shadow:0 0 24px rgba(255,201,75,0.25);
  }
  .qr-box canvas{display:block; width:220px; height:220px;}
  .btn-paynow{
    display:flex; align-items:center; justify-content:center; gap:8px;
    text-decoration:none; margin:16px 0 6px; padding:14px;
    border-radius:12px; font-size:16px; font-weight:800; letter-spacing:0.3px;
    color:#0B2B1E; background:linear-gradient(135deg, var(--mint), #3FAE82);
    box-shadow:0 8px 20px rgba(95,217,164,0.4); border:none; width:100%; cursor:pointer;
  }
  .btn-paynow:active{transform:translateY(1px);}
  .receipt-foot{text-align:center; font-size:15px; color:#ffffff; margin-top:10px; letter-spacing:0.5px; font-weight:700;}
  .btn-confirm{
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; text-align:center; margin-top:12px; padding:13px;
    border-radius:12px; border:none;
    background:linear-gradient(135deg, var(--gold), #d99a2b);
    color:#2A1A0A; font-size:15px; font-weight:800; letter-spacing:0.2px;
    box-shadow:0 8px 20px rgba(242,184,75,0.4); cursor:pointer;
  }
  .btn-confirm:active{transform:translateY(1px);}
  .confirm-form{display:none; margin-top:10px;}
  .confirm-form.show{display:block;}
  .confirm-form input{
    width:100%; padding:11px 12px; border-radius:10px; border:1px solid var(--line);
    background:var(--bg); color:var(--text); font-size:14px; margin-bottom:8px;
  }
  .confirm-form .hint{font-size:11px; color:var(--lav-dim); margin:-4px 0 8px;}
  .confirm-form button{
    width:100%; padding:11px; border-radius:10px; border:none;
    background:var(--gold); color:#2A1A0A; font-weight:700; font-size:14px; cursor:pointer;
  }
  .confirm-done{
    text-align:center; margin-top:10px; padding:11px; border-radius:12px;
    background:rgba(95,217,164,0.1); border:1px solid var(--mint); color:var(--mint);
    font-size:13px; font-weight:600;
  }
  .paid-stamp{
    position:absolute; top:42%; left:50%; transform:translate(-50%,-50%) rotate(-18deg);
    border:4px solid var(--mint); color:var(--mint); font-weight:800; font-size:26px;
    padding:6px 18px; border-radius:8px; letter-spacing:3px; opacity:0.9;
    background:rgba(95,217,164,0.08); z-index:5;
  }
  .status-msg{text-align:center; padding:60px 20px; color:var(--lav-dim); font-size:14px;}
  .brand-foot{text-align:center; margin-top:16px; font-size:11px; color:var(--lav-dim);}
</style>
</head>
<body>

<div id="root">
  <div class="status-msg">Loading payment request...</div>
</div>

<script src="../qrcode.min.js"></script>
<script>
  const firebaseUrl = "https://kmbsc-chit-default-rtdb.asia-southeast1.firebasedatabase.app";

  function formatRupee(amount) {
    if (amount === null || amount === undefined) return "Amount not fixed — enter in app";
    const n = parseFloat(amount);
    if (isNaN(n)) return "₹0";
    return "₹" + n.toLocaleString("en-IN", { maximumFractionDigits: 2 });
  }

  function formatDate(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" }) +
      " · " + d.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" });
  }

  function buildUpiLink(entry) {
    const params = [];
    params.push("pa=" + encodeURIComponent(entry.upi));
    params.push("pn=" + encodeURIComponent(entry.name));
    if (entry.amount) params.push("am=" + encodeURIComponent(entry.amount));
    params.push("cu=INR");
    if (entry.purpose) params.push("tn=" + encodeURIComponent(entry.purpose));
    return `upi://pay?${params.join("&")}`;
  }

  function getParam(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  function escapeHtml(str) {
    const d = document.createElement("div");
    d.textContent = str == null ? "" : String(str);
    return d.innerHTML;
  }

  function fitToScreen() {
    const root = document.getElementById("root");
    if (!root) return;
    root.style.transform = "scale(1)";
    requestAnimationFrame(() => {
      const rect = root.getBoundingClientRect();
      const availH = window.innerHeight - 16;
      const availW = window.innerWidth - 20;
      const scale = Math.min(1, availH / rect.height, availW / rect.width);
      root.style.transform = `scale(${scale})`;
    });
  }

  window.addEventListener("resize", fitToScreen);
  window.addEventListener("orientationchange", fitToScreen);

  async function bumpViewCount(id) {
    try {
      const res = await fetch(`${firebaseUrl}/paymentLinks/entries/${id}/views.json`);
      const current = await res.json();
      await fetch(`${firebaseUrl}/paymentLinks/entries/${id}/views.json`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify((current || 0) + 1)
      });
    } catch (e) { /* non-critical, ignore failures */ }
  }

  function getMyConfirmKey(id) {
    return "paylink_myconfirm_" + id;
  }

  async function submitConfirmation(id, name) {
    const res = await fetch(`${firebaseUrl}/paymentLinks/entries/${id}/confirmations.json`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name || "Anonymous", confirmedAt: Date.now() })
    });
    if (!res.ok) throw new Error("save failed");
    const data = await res.json();
    localStorage.setItem(getMyConfirmKey(id), data.name);
    return data.name;
  }

  async function removeConfirmation(id, confirmId) {
    const res = await fetch(`${firebaseUrl}/paymentLinks/entries/${id}/confirmations/${confirmId}.json`, {
      method: "DELETE"
    });
    if (!res.ok) throw new Error("delete failed");
    localStorage.removeItem(getMyConfirmKey(id));
  }

  async function loadEntry() {
    const id = getParam("id");
    const root = document.getElementById("root");
    if (!id) {
      root.innerHTML = '<div class="status-msg">Payment link தவறு. Link சரி பாருங்க.</div>';
      return;
    }
    try {
      const res = await fetch(`${firebaseUrl}/paymentLinks/entries/${id}.json`);
      const entry = await res.json();
      if (!entry) {
        root.innerHTML = '<div class="status-msg">இந்த payment request கிடைக்கல. Link expire ஆகி இருக்கலாம்.</div>';
        return;
      }
      renderCard(entry);
      bumpViewCount(id);
    } catch (e) {
      root.innerHTML = '<div class="status-msg">Network error. மறுபடி try பண்ணுங்க.</div>';
    }
  }

  function isExpired(entry) {
    if (!entry.expiryDate) return false;
    const expiryEnd = new Date(entry.expiryDate + "T23:59:59").getTime();
    return Date.now() > expiryEnd;
  }

  function renderCard(entry) {
    const root = document.getElementById("root");
    const link = buildUpiLink(entry);
    const isPaid = entry.status === "paid";
    const expired = !isPaid && isExpired(entry);
    const id = getParam("id");

    const confirmations = entry.confirmations ? Object.entries(entry.confirmations) : [];
    confirmations.sort((a, b) => (a[1].confirmedAt || 0) - (b[1].confirmedAt || 0));
    const myConfirmedName = localStorage.getItem(getMyConfirmKey(id));

    const confirmListHtml = confirmations.length ? `
      <div class="confirm-done">
        ✅ <b>${confirmations.length}</b> பேர் pay பண்ணிட்டேன்னு சொல்லிருக்காங்க:
        <div style="margin-top:8px; text-align:left;">
          ${confirmations.map(([cid, c]) => `
            <div style="display:flex; justify-content:space-between; font-size:12px; padding:4px 0; border-bottom:1px solid rgba(255,255,255,0.08);">
              <span>${escapeHtml(c.name || "Anonymous")}</span>
              <span style="color:var(--lav-dim,#9a8fb8);">${formatDate(c.confirmedAt)}</span>
            </div>
          `).join("")}
        </div>
        ${myConfirmedName ? `<div style="margin-top:8px;"><a href="#" id="undoConfirmLink" style="color:var(--coral); font-size:11.5px; text-decoration:underline;">❌ என்னோட confirmation தவறு, Undo பண்ணுங்க</a></div>` : ''}
      </div>
    ` : '';

    root.innerHTML = `
      <div class="receipt">
        <div class="receipt-inner">
          <div class="receipt-stamp"><span>Payment Request</span></div>
          ${expired ? `<div style="background:rgba(255,107,91,0.15); color:#ff6b6b; border-radius:10px; padding:10px 14px; font-size:13px; font-weight:700; text-align:center; margin-bottom:12px;">⚠️ இந்த payment link-oda validity முடிந்துவிட்டது.<br>தொடர்பு கொண்டு உறுதி செய்யவும்.</div>` : ''}
          <div class="receipt-amt">${entry.amount === null || entry.amount === undefined ? 'Open Amount' : formatRupee(entry.amount)}</div>
          ${entry.amount === null || entry.amount === undefined ? '<div class="receipt-open-note">தொகை fix பண்ணல — நீங்க app-ல enter பண்ணிக்கலாம்</div>' : ''}
          <div class="receipt-line"><span class="l-key">Pay to</span><span class="l-val">${entry.name}</span></div>
          <div class="receipt-line"><span class="l-key">UPI ID</span><span class="l-val">${entry.upi}</span></div>
          <div class="receipt-line"><span class="l-key">Purpose</span><span class="l-val purpose-val">${entry.purpose}</span></div>
          <div class="receipt-line"><span class="l-key">Date</span><span class="l-val">${formatDate(entry.createdAt)}</span></div>
          <div class="qr-box"><div id="qrcodeEl"></div></div>
          <a href="${link}" class="btn-paynow">💳 Pay Now</a>
          <div class="receipt-foot">Scan QR illa Pay Now பட்டன் அழுத்துங்க</div>

          ${confirmListHtml}
          ${!isPaid ? `<button class="btn-confirm" id="confirmSubmitBtn">✅ Naan Pay Pannitten</button>` : ''}

          ${isPaid ? '<div class="paid-stamp">PAID</div>' : ''}
        </div>
      </div>
      <div class="brand-foot">PayLink · sramesh.in</div>
    `;

    new QRCode(document.getElementById("qrcodeEl"), {
      text: link,
      width: 170,
      height: 170,
      colorDark: "#1A1024",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });

    const toggleBtn = document.getElementById("confirmToggleBtn");
    if (toggleBtn) {
      toggleBtn.addEventListener("click", () => {
        document.getElementById("confirmForm").classList.toggle("show");
      });
    }

    const submitBtn = document.getElementById("confirmSubmitBtn");
    if (submitBtn) {
      submitBtn.addEventListener("click", async () => {
        const name = prompt("உங்க பேர் என்ன? (Optional, Cancel பண்ணா 'Anonymous' ஆ save ஆகும்)");
        if (name === null) return; // user pressed Cancel on the prompt itself
        submitBtn.disabled = true;
        submitBtn.textContent = "Saving...";
        try {
          await submitConfirmation(id, name.trim());
          const fresh = await fetch(`${firebaseUrl}/paymentLinks/entries/${id}.json`).then(r => r.json());
          renderCard(fresh);
        } catch (e) {
          submitBtn.disabled = false;
          submitBtn.textContent = "✅ Naan Pay Pannitten";
          alert("Save ஆகல, மறுபடி try பண்ணுங்க");
        }
      });
    }

    const undoLink = document.getElementById("undoConfirmLink");
    if (undoLink) {
      undoLink.addEventListener("click", async (e) => {
        e.preventDefault();
        undoLink.textContent = "Undo செய்கிறோம்...";
        try {
          const myName = localStorage.getItem(getMyConfirmKey(id));
          const match = confirmations.find(([cid, c]) => c.name === myName);
          if (match) await removeConfirmation(id, match[0]);
          const fresh = await fetch(`${firebaseUrl}/paymentLinks/entries/${id}.json`).then(r => r.json());
          renderCard(fresh);
        } catch (err) {
          alert("Undo ஆகல, மறுபடி try பண்ணுங்க");
          undoLink.textContent = "❌ என்னோட confirmation தவறு, Undo பண்ணுங்க";
        }
      });
    }

    fitToScreen();
  }

  loadEntry();
</script>
</body>
</html>
