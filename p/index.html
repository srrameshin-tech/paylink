<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PayLink - Payment Request</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
  :root{
    --bg:#1A1024; --card:#2A1A3A;
    --coral:#FF7A5C; --coral-dim:#E85A42;
    --gold:#FFC94B; --mint:#3EE8A8;
    --lav:#9B8FA8; --lav-dim:#6E6378;
    --text:#F3ECF7; --line:#43304F;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; height:100dvh; background:var(--bg); color:var(--text);
    font-family:'Segoe UI',Roboto,Arial,sans-serif;
    display:flex; align-items:center; justify-content:center;
    padding:calc(env(safe-area-inset-top) + 10px) 14px calc(env(safe-area-inset-bottom) + 10px);
    overflow:hidden;
  }
  .receipt-wrap{width:100%; max-width:360px; max-height:100%; display:flex; align-items:center;}
  .receipt{
    width:100%;
    background:
      linear-gradient(var(--card), var(--card)) padding-box,
      linear-gradient(135deg, var(--gold), var(--coral) 45%, var(--mint)) border-box;
    border:2px solid transparent;
    border-radius:16px; position:relative;
    box-shadow:0 10px 28px rgba(0,0,0,0.5), 0 0 18px rgba(242,184,75,0.16);
    max-height:100%; overflow:hidden;
  }
  .receipt::before{
    content:"✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦";
    position:absolute; top:6px; left:0; right:0; text-align:center;
    color:var(--gold); font-size:8px; letter-spacing:2.5px; opacity:0.55;
  }
  .receipt-inner{padding:16px 16px 12px;}
  .receipt-stamp{
    text-align:center; margin-bottom:4px;
  }
  .receipt-stamp span{
    display:inline-block; background:linear-gradient(135deg, var(--gold), var(--coral));
    color:#1A1024; font-size:10.5px; letter-spacing:1.5px; font-weight:800;
    text-transform:uppercase; padding:4px 13px; border-radius:20px;
    box-shadow:0 4px 14px rgba(255,201,75,0.45);
  }
  .receipt-amt{
    text-align:center; font-size:clamp(20px,7vh,28px); font-weight:800; color:var(--gold);
    font-family:'Georgia',serif; margin:6px 0 2px;
  }
  .receipt-open-note{
    text-align:center; font-size:11px; color:var(--lav-dim); margin:0 0 8px; line-height:1.35;
  }
  .receipt-line{
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:5px 0; border-bottom:1px dashed var(--line); font-size:12.5px; gap:10px;
  }
  .receipt-line:last-of-type{border-bottom:none;}
  .receipt-line .l-key{color:var(--lav); flex-shrink:0;}
  .receipt-line .l-val{color:var(--text); font-weight:600; text-align:right; word-break:break-word;}
  .receipt-line .l-val.purpose-val{color:var(--mint); font-weight:700;}
  .qr-box{
    display:flex; justify-content:center; margin:8px 0 4px; padding:10px;
    background:#fff; border-radius:12px;
    box-shadow:0 0 24px rgba(255,201,75,0.25);
  }
  .qr-box canvas{display:block; width:clamp(120px,22vh,180px); height:clamp(120px,22vh,180px);}
  .btn-paynow{
    display:flex; align-items:center; justify-content:center; gap:8px;
    text-decoration:none; margin:8px 0 4px; padding:11px;
    border-radius:12px; font-size:14px; font-weight:800; letter-spacing:0.3px;
    color:#0B2B1E; background:linear-gradient(135deg, var(--mint), #3FAE82);
    box-shadow:0 8px 20px rgba(95,217,164,0.4); border:none; width:100%; cursor:pointer;
  }
  .btn-paynow:active{transform:translateY(1px);}
  .receipt-foot{text-align:center; font-size:12px; color:#ffffff; margin-top:6px; letter-spacing:0.3px; font-weight:700; line-height:1.35;}
  .btn-confirm{
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; text-align:center; margin-top:8px; padding:11px;
    border-radius:12px; border:none;
    background:linear-gradient(135deg, var(--gold), #d99a2b);
    color:#2A1A0A; font-size:13.5px; font-weight:800; letter-spacing:0.2px;
    box-shadow:0 8px 20px rgba(242,184,75,0.4); cursor:pointer;
  }
  .btn-confirm:active{transform:translateY(1px);}
  .confirm-form{display:none; margin-top:8px;}
  .confirm-form.show{display:block;}
  .confirm-form input{
    width:100%; padding:9px 11px; border-radius:10px; border:1px solid var(--line);
    background:var(--bg); color:var(--text); font-size:13px; margin-bottom:6px;
  }
  .confirm-form .hint{font-size:10px; color:var(--lav-dim); margin:-3px 0 6px;}
  .confirm-form button{
    width:100%; padding:10px; border-radius:10px; border:none;
    background:var(--gold); color:#2A1A0A; font-weight:700; font-size:13px; cursor:pointer;
  }
  .confirm-done{
    text-align:center; margin-top:8px; padding:9px; border-radius:12px;
    background:rgba(95,217,164,0.1); border:1px solid var(--mint); color:var(--mint);
    font-size:12px; font-weight:600;
  }
  .paid-stamp{
    position:absolute; top:42%; left:50%; transform:translate(-50%,-50%) rotate(-18deg);
    border:4px solid var(--mint); color:var(--mint); font-weight:800; font-size:22px;
    padding:5px 16px; border-radius:8px; letter-spacing:2.5px; opacity:0.9;
    background:rgba(95,217,164,0.08); z-index:5;
  }
  .status-msg{text-align:center; padding:40px 20px; color:var(--lav-dim); font-size:13px;}
  .brand-foot{text-align:center; margin-top:10px; font-size:10px; color:var(--lav-dim);}
</style>
</head>
<body>

<div class="receipt-wrap" id="root">
  <div class="status-msg">Loading payment request...</div>
</div>

<script src="../qrcode.min.js"></script>
<script>
  const firebaseUrl = "https://kmbsc-chit-default-rtdb.asia-southeast1.firebasedatabase.app";

  function formatRupee(amount) {
    if (amount === null || amount === undefined) return "Amount not fixed — enter in app";
    const n = parseFloat(amount);
    if (isNaN(n)) return "₹0";
    return "₹" + n.toLocaleString("en-IN", { maximumFractionDigits: 2 });
  }

  function formatDate(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" }) +
      " · " + d.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" });
  }

  function buildUpiLink(entry) {
    const params = [];
    params.push("pa=" + encodeURIComponent(entry.upi));
    params.push("pn=" + encodeURIComponent(entry.name));
    if (entry.amount) params.push("am=" + encodeURIComponent(entry.amount));
    params.push("cu=INR");
    if (entry.purpose) params.push("tn=" + encodeURIComponent(entry.purpose));
    return `upi://pay?${params.join("&")}`;
  }

  function getParam(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  function escapeHtml(str) {
    const d = document.createElement("div");
    d.textContent = str == null ? "" : String(str);
    return d.innerHTML;
  }

  async function submitPayerNote(id) {
    const body = JSON.stringify({ confirmedAt: Date.now() });
    const res = await fetch(`${firebaseUrl}/paymentLinks/entries/${id}/payerNote.json`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body
    });
    if (!res.ok) throw new Error("save failed");
  }

  async function removePayerNote(id) {
    const res = await fetch(`${firebaseUrl}/paymentLinks/entries/${id}/payerNote.json`, {
      method: "DELETE"
    });
    if (!res.ok) throw new Error("delete failed");
  }

  async function loadEntry() {
    const id = getParam("id");
    const root = document.getElementById("root");
    if (!id) {
      root.innerHTML = '<div class="status-msg">Payment link தவறு. Link சரி பாருங்க.</div>';
      return;
    }
    try {
      const res = await fetch(`${firebaseUrl}/paymentLinks/entries/${id}.json`);
      const entry = await res.json();
      if (!entry) {
        root.innerHTML = '<div class="status-msg">இந்த payment request கிடைக்கல. Link expire ஆகி இருக்கலாம்.</div>';
        return;
      }
      renderCard(entry);
    } catch (e) {
      root.innerHTML = '<div class="status-msg">Network error. மறுபடி try பண்ணுங்க.</div>';
    }
  }

  function renderCard(entry) {
    const root = document.getElementById("root");
    const link = buildUpiLink(entry);
    const isPaid = entry.status === "paid";

    root.innerHTML = `
      <div class="receipt">
        <div class="receipt-inner">
          <div class="receipt-stamp"><span>Payment Request</span></div>
          <div class="receipt-amt">${entry.amount === null || entry.amount === undefined ? 'Open Amount' : formatRupee(entry.amount)}</div>
          ${entry.amount === null || entry.amount === undefined ? '<div class="receipt-open-note">தொகை fix பண்ணல — நீங்க app-ல enter பண்ணிக்கலாம்</div>' : ''}
          <div class="receipt-line"><span class="l-key">Pay to</span><span class="l-val">${entry.name}</span></div>
          <div class="receipt-line"><span class="l-key">UPI ID</span><span class="l-val">${entry.upi}</span></div>
          <div class="receipt-line"><span class="l-key">Purpose</span><span class="l-val purpose-val">${entry.purpose}</span></div>
          <div class="receipt-line"><span class="l-key">Date</span><span class="l-val">${formatDate(entry.createdAt)}</span></div>
          <div class="qr-box"><div id="qrcodeEl"></div></div>
          <a href="${link}" class="btn-paynow">💳 Pay Now</a>
          <div class="receipt-foot">Scan QR illa Pay Now பட்டன் அழுத்துங்க</div>

          ${entry.payerNote ? `
            <div class="confirm-done">
              ✅ Pay பண்ணிட்டேன்னு சொல்லிட்டாங்க · ${formatDate(entry.payerNote.confirmedAt)}
              <div><a href="#" id="undoConfirmLink" style="color:var(--coral); font-size:11.5px; text-decoration:underline;">❌ இது தவறு, Undo பண்ணுங்க</a></div>
            </div>
          ` : !isPaid ? `
            <button class="btn-confirm" id="confirmSubmitBtn">✅ Naan Pay Pannitten</button>
          ` : ''}

          ${isPaid ? '<div class="paid-stamp">PAID</div>' : ''}
        </div>
      </div>
      <div class="brand-foot">PayLink · sramesh.in</div>
    `;

    new QRCode(document.getElementById("qrcodeEl"), {
      text: link,
      width: 170,
      height: 170,
      colorDark: "#1A1024",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });

    const toggleBtn = document.getElementById("confirmToggleBtn");
    if (toggleBtn) {
      toggleBtn.addEventListener("click", () => {
        document.getElementById("confirmForm").classList.toggle("show");
      });
    }

    const submitBtn = document.getElementById("confirmSubmitBtn");
    if (submitBtn) {
      submitBtn.addEventListener("click", async () => {
        submitBtn.disabled = true;
        submitBtn.textContent = "Saving...";
        try {
          const id = getParam("id");
          await submitPayerNote(id);
          entry.payerNote = { confirmedAt: Date.now() };
          renderCard(entry);
        } catch (e) {
          submitBtn.disabled = false;
          submitBtn.textContent = "✅ Naan Pay Pannitten";
          alert("Save ஆகல, மறுபடி try பண்ணுங்க");
        }
      });
    }

    const undoLink = document.getElementById("undoConfirmLink");
    if (undoLink) {
      undoLink.addEventListener("click", async (e) => {
        e.preventDefault();
        undoLink.textContent = "Undo செய்கிறோம்...";
        try {
          const id = getParam("id");
          await removePayerNote(id);
          delete entry.payerNote;
          renderCard(entry);
        } catch (err) {
          alert("Undo ஆகல, மறுபடி try பண்ணுங்க");
          undoLink.textContent = "❌ இது தவறு, Undo பண்ணுங்க";
        }
      });
    }
  }

  loadEntry();
</script>
</body>
</html>
